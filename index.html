<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arizona RP | Форум LSPD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d0e12; color: #e2e8f0; }
        .arizona-header { background-color: #161920; border-bottom: 1px solid #222735; }
        .arizona-card { background-color: #151821; border: 1px solid #1d222f; border-radius: 16px; }
        .arizona-subcard { background-color: #11131a; border: 1px solid #1c202b; border-radius: 14px; }
        .arizona-input { background-color: #0d0e12; border: 1px solid #222735; }
        .arizona-input:focus { border-color: #e53e3e; outline: none; }
        
        .role-leader { color: #5B21B6; font-weight: 700; text-shadow: 0 0 5px rgba(91,33,182,0.3); }
        .role-deputy { color: #15803D; font-weight: 700; text-shadow: 0 0 5px rgba(21,128,61,0.3); }
        .role-high { color: #1E3A8A; font-weight: 600; }
        .role-officer { color: #D97706; font-weight: 600; }
        .role-user { color: #4B5563; font-weight: 500; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d0e12; }
        ::-webkit-scrollbar-thumb { background: #222735; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden max-w-md mx-auto border-x border-[#1d222f] shadow-2xl">

    <!-- HEADER -->
    <header class="arizona-header px-4 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <i class="fa-solid fa-bars text-xl text-gray-400 cursor-pointer"></i>
            <div class="flex items-center justify-center w-8 h-8 rounded-lg font-black text-xl italic tracking-tighter" style="background: linear-gradient(135deg, #e11d48, #2563eb); color: #fff;">A</div>
        </div>
        <div class="flex items-center gap-5 text-gray-400">
            <!-- Кликабельная Аватарка -->
            <div onclick="changeAvatar()" class="w-7 h-7 rounded-full overflow-hidden border border-gray-600 bg-slate-700 flex items-center justify-center cursor-pointer relative group" title="Сменить аватарку">
                <img id="user-avatar" src="" class="w-full h-full object-cover hidden">
                <i id="avatar-placeholder" class="fa-solid fa-user text-xs text-gray-300"></i>
            </div>
            <div class="relative cursor-pointer">
                <i class="fa-solid fa-envelope text-lg"></i>
                <span class="absolute -top-1.5 -right-1.5 bg-red-600 text-[9px] text-white font-bold w-4 h-4 rounded-full flex items-center justify-center">1</span>
            </div>
            <div class="relative cursor-pointer">
                <i class="fa-solid fa-bell text-lg"></i>
                <span class="absolute -top-1.5 -right-1.5 bg-red-600 text-[9px] text-white font-bold w-4 h-4 rounded-full flex items-center justify-center">1</span>
            </div>
            <i class="fa-solid fa-bolt text-lg cursor-pointer hover:text-amber-400"></i>
            <i class="fa-solid fa-magnifying-glass text-lg cursor-pointer"></i>
        </div>
    </header>

    <!-- ИНФО О СЕРВЕРЕ -->
    <div class="p-4 bg-[#0d0e12] shrink-0">
        <div class="arizona-card p-4">
            <div class="text-lg font-bold text-gray-100 flex items-center gap-1.5 mb-3">
                Arizona Mobile 3 <span class="text-base">🌸</span>
            </div>
            <div class="flex justify-between items-center gap-2">
                <button class="flex-1 bg-[#11131a] border border-[#222735] rounded-xl py-2.5 px-4 text-xs font-semibold text-gray-300 flex items-center gap-2">
                    <i class="fa-solid fa-chevron-left text-[10px] text-gray-500"></i> Сервера Arizona Online
                </button>
                <button id="logout-btn" onclick="logout()" class="hidden bg-[#11131a] border border-[#222735] rounded-xl p-2.5 text-xs text-red-400 cursor-pointer" title="Выйти">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
            <div id="user-badge" class="mt-3 text-xs text-gray-400 hidden">
                Вы вошли как: <span id="badge-name" class="font-bold"></span>
            </div>
        </div>
    </div>

    <!-- СПИСОК КАНАЛОВ -->
    <div id="forum-view" class="flex-1 overflow-y-auto px-4 pb-6 space-y-3"></div>

    <!-- СТРАНИЦА ВНУТРИ КАНАЛА -->
    <div id="channel-view" class="flex-1 flex flex-col bg-[#0d0e12] hidden overflow-hidden">
        <div class="p-3 arizona-header flex items-center gap-3 shrink-0">
            <button onclick="backToForum()" class="text-gray-400 hover:text-white px-2 py-1 cursor-pointer">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div>
                <h2 id="channel-title" class="font-bold text-sm text-gray-100"></h2>
                <p id="channel-desc" class="text-[10px] text-gray-500"></p>
            </div>
        </div>
        <div id="channel-body" class="flex-1 p-4 overflow-y-auto space-y-3 flex flex-col"></div>
        <div id="chat-input-zone" class="p-3 bg-[#161920] border-t border-[#222735] shrink-0 hidden">
            <form id="chat-form" class="flex gap-2">
                <input id="chat-input" type="text" placeholder="Написать ответ..." class="flex-1 arizona-input rounded-xl px-4 py-2.5 text-xs text-gray-200">
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white rounded-xl px-4 text-xs font-semibold">Отправить</button>
            </form>
        </div>
    </div>

    <!-- КНОПКА АДМИНКИ -->
    <div id="admin-trigger" class="p-4 bg-[#0d0e12] border-t border-[#1d222f] shrink-0 hidden">
        <button onclick="openAdminMenu()" class="w-full bg-red-600/20 hover:bg-red-600/30 text-red-400 border border-red-900/50 py-2.5 rounded-xl text-xs font-semibold cursor-pointer">
            Панель управления должностями
        </button>
    </div>

    <!-- ОКНО ВХОДА И РЕГИСТРАЦИИ -->
    <div id="login-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="arizona-card p-6 w-full max-w-sm">
            <div class="text-center mb-5">
                <div class="text-xl font-black text-gray-100 tracking-wide uppercase">Вход на портал LSPD</div>
                <p id="login-tip" class="text-xs text-gray-500 mt-1">Введите Nick_Name. Если вы впервые, аккаунт создастся автоматически.</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-[11px] text-gray-400 font-medium mb-1">Ник-нейм на английском (Nick_Name)</label>
                    <input id="login-nick" type="text" required placeholder="Ivan_Ivanov" class="w-full arizona-input rounded-xl p-3 text-xs text-gray-200">
                </div>
                <div id="rank-field-block">
                    <label class="block text-[11px] text-gray-400 font-medium mb-1">Ваша должность (Название и ранг)</label>
                    <input id="login-rank" type="text" placeholder="Сержант [4]" class="w-full arizona-input rounded-xl p-3 text-xs text-gray-200">
                </div>
                <div>
                    <label id="pass-label" class="block text-[11px] text-gray-400 font-medium mb-1">Пароль</label>
                    <input id="login-pass" type="password" required placeholder="••••••••" class="w-full arizona-input rounded-xl p-3 text-xs text-gray-200">
                </div>
                <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl text-xs">Подтвердить</button>
            </form>
        </div>
    </div>

    <!-- МЕНЮ УПРАВЛЕНИЯ РОЛЯМИ -->
    <div id="admin-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 hidden">
        <div class="arizona-card p-5 w-full max-w-sm flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-4">
                <div class="font-bold text-sm text-gray-200">Управление сотрудниками</div>
                <button onclick="closeAdminMenu()" class="text-gray-500 text-lg">&times;</button>
            </div>
            <div id="admin-user-list" class="flex-1 overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <script>
        const ROLES = {
            LEADER: { name: 'Лидер', class: 'role-leader' },
            DEPUTY: { name: 'Заместитель', class: 'role-deputy' },
            HIGH: { name: 'Старший Состав', class: 'role-high' },
            OFFICER: { name: 'Сотрудник', class: 'role-officer' },
            USER: { name: 'Пользователь', class: 'role-user' }
        };

        // Загрузка или создание базы данных с вашими условиями
        let users = JSON.parse(localStorage.getItem('lspd_forum_users')) || [
            { nick: 'Moskvin_Bounce', rank: 'Шеф', role: 'LEADER', pass: null, avatar: '' },
            { nick: 'Trevor_Mersor', rank: 'Главный Комиссар', role: 'DEPUTY', pass: 'Bu2MvZ96', avatar: '' }
        ];

        let channels = [
            { id: 'upgrade', title: 'Систему Повышения', type: 'info', access: 'info', iconBg: 'bg-red-600/20 text-red-500', preText: 'Официальные критерии для повышения...', author: 'Moskvin_Bounce', time: 'Сегодня' },
            { id: 'swat', title: 'Информация и Устав S.W.A.T', type: 'info', access: 'info', iconBg: 'bg-gray-700/30 text-gray-400', preText: 'Положения спец. отряда', author: 'Trevor_Mersor', time: 'Вчера' },
            { id: 'members', title: 'Список Сотрудников LSPD', type: 'info', access: 'info', iconBg: 'bg-gray-700/30 text-gray-400', preText: 'Реестр департамента полиции', author: 'Moskvin_Bounce', time: '30 Мар 2026' },
            { id: 'bonuses', title: 'Информация о получении Премий', type: 'info', access: 'info', iconBg: 'bg-gray-700/30 text-gray-400', preText: 'Заявления на денежные поощрения', author: 'Trevor_Mersor', time: '2 дня назад' },
            { id: 'praise', title: 'Система Похвалы', type: 'info', access: 'info', iconBg: 'bg-gray-700/30 text-gray-400', preText: 'Выдача похвалы за работу', author: 'Moskvin_Bounce', time: 'Вчера' },
            { id: 'kurilka', title: 'Курилка | LSPD', type: 'chat', access: 'open', iconBg: 'bg-red-600/20 text-red-500', preText: 'Разговоры обо всем', author: 'Система', time: 'Только что', messages: [] },
            { id: 'praise-requests', title: 'Заявления на получение Похвалы', type: 'chat', access: 'open', iconBg: 'bg-red-600/20 text-red-500', preText: 'Рапорты сотрудников', author: 'Система', time: '1 час назад', messages: [] },
            { id: 'secret', title: 'Офис Шерифа [🔒 Закрытый]', type: 'chat', access: 'closed', allowed: ['LEADER', 'DEPUTY'], iconBg: 'bg-gray-700/50 text-red-400', preText: 'Кабинет руководства LSPD', author: 'Moskvin_Bounce', time: 'Секретно', messages: [] }
        ];

        let currentUser = null;

        // Следим за вводом никнейма, чтобы адаптировать форму
        document.getElementById('login-nick').addEventListener('input', (e) => {
            const nick = e.target.value.trim();
            const user = users.find(u => u.nick.toLowerCase() === nick.toLowerCase());
            const rankBlock = document.getElementById('rank-field-block');
            const passLabel = document.getElementById('pass-label');

            if (user) {
                rankBlock.classList.add('hidden'); // Должность системных менять нельзя
                if (user.nick === 'Moskvin_Bounce' && !user.pass) {
                    passLabel.innerText = "Придумайте пароль для Лидера (Первый вход)";
                } else {
                    passLabel.innerText = "Введите пароль";
                }
            } else {
                rankBlock.classList.remove('hidden');
                passLabel.innerText = "Придумайте пароль для регистрации";
            }
        });

        // Вход и регистрация
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const nick = document.getElementById('login-nick').value.trim();
            const rank = document.getElementById('login-rank').value.trim();
            const pass = document.getElementById('login-pass').value;

            let user = users.find(u => u.nick.toLowerCase() === nick.toLowerCase());

            if (user) {
                // Если Москвин заходит впервые, сохраняем его новый пароль
                if (user.nick === 'Moskvin_Bounce' && !user.pass) {
                    user.pass = pass;
                    localStorage.setItem('lspd_forum_users', JSON.stringify(users));
                    alert('Пароль лидера успешно установлен!');
                } else if (user.pass !== pass) {
                    alert('Неверный пароль!');
                    return;
                }
            } else {
                // Создание обычного пользователя (Авто-роль USER)
                user = { nick, rank: rank || 'Гражданский', role: 'USER', pass: pass, avatar: '' };
                users.push(user);
                localStorage.setItem('lspd_forum_users', JSON.stringify(users));
            }

            currentUser = user;
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('user-badge').classList.remove('hidden');
            
            updateAvatarUI();

            document.getElementById('badge-name').className = ROLES[currentUser.role].class;
            document.getElementById('badge-name').innerText = `${currentUser.nick} [${currentUser.rank}]`;

            if (currentUser.role === 'LEADER' || currentUser.role === 'DEPUTY') {
                document.getElementById('admin-trigger').classList.remove('hidden');
            }

            renderForum();
        });

        // Изменение аватарки
        function changeAvatar() {
            if (!currentUser) return;
            const url = prompt("Введите URL-ссылку на вашу новую аватарку (из интернета):", currentUser.avatar || "");
            if (url !== null) {
                currentUser.avatar = url.trim();
                // Синхронизируем изменения в общем массиве пользователей
                const idx = users.findIndex(u => u.nick === currentUser.nick);
                if (idx !== -1) users[idx].avatar = currentUser.avatar;
                localStorage.setItem('lspd_forum_users', JSON.stringify(users));
                updateAvatarUI();
            }
        }

        function updateAvatarUI() {
            const img = document.getElementById('user-avatar');
            const placeholder = document.getElementById('avatar-placeholder');
            if (currentUser && currentUser.avatar) {
                img.src = currentUser.avatar;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                img.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
        }

        // Рендер тем/каналов
        function renderForum() {
            const container = document.getElementById('forum-view');
            container.innerHTML = '';

            channels.forEach(ch => {
                const isClosed = ch.access === 'closed';
                const hasAccess = !isClosed || ch.allowed.includes(currentUser.role);
                let lockIcon = isClosed ? ' <i class="fa-solid fa-lock text-[10px] text-red-500 ml-1"></i>' : '';

                let lastTopicHTML = hasAccess 
                    ? `<div class="text-[11px] text-gray-400 mt-1 truncate"><span class="bg-red-600/20 text-red-400 px-1 rounded text-[10px] mr-1 font-bold">Тема</span> ${ch.preText}</div>
                       <div class="text-[10px] text-gray-500 mt-0.5">${ch.time} · <span class="text-gray-400">${ch.author}</span></div>`
                    : `<div class="text-[11px] text-red-400/70 mt-1 italic">🔒 Раздел скрыт настройками приватности</div>`;

                container.insertAdjacentHTML('beforeend', `
                    <div onclick="openChannel('${ch.id}')" class="arizona-card p-3.5 flex items-start gap-3.5 cursor-pointer hover:bg-[#1a1e29] transition-all">
                        <div class="w-10 h-10 rounded-full ${ch.iconBg} flex items-center justify-center shrink-0 text-base">
                            <i class="fa-regular fa-comments"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-[13px] text-gray-100 flex items-center">${ch.title}${lockIcon}</h3>
                            ${lastTopicHTML}
                        </div>
                    </div>
                `);
            });
        }

        function openChannel(id) {
            const ch = channels.find(c => c.id === id);
            if (ch.access === 'closed' && !ch.allowed.includes(currentUser.role)) {
                alert('У вас нет доступа к этой секретной теме!');
                return;
            }

            document.getElementById('forum-view').classList.add('hidden');
            document.getElementById('channel-view').classList.remove('hidden');
            document.getElementById('channel-title').innerText = ch.title;
            
            let descText = 'Доступ: Все сотрудники фракции';
            if (ch.access === 'info') descText = 'Доступ: Только чтение (Для руководства)';
            if (ch.access === 'closed') descText = 'Доступ: Совершенно Секретно';
            document.getElementById('channel-desc').innerText = descText;

            renderChannelContent(ch);
        }

        function renderChannelContent(ch) {
            const body = document.getElementById('channel-body');
            const inputZone = document.getElementById('chat-input-zone');
            body.innerHTML = '';
            inputZone.classList.add('hidden');

            const canWrite = ch.access === 'open' || ((ch.access === 'info' || ch.access === 'closed') && (currentUser.role === 'LEADER' || currentUser.role === 'DEPUTY'));

            if (ch.type === 'info') {
                body.innerHTML = `
                    <div class="arizona-subcard p-5 text-center text-gray-500 text-xs italic my-auto">
                        <i class="fa-solid fa-folder-open text-3xl text-gray-600 mb-3 block"></i>
                        Раздел пока пуст. Заполняется Руководством.
                    </div>
                `;
            } else {
                if (canWrite) inputZone.classList.remove('hidden');
                if (!ch.messages || ch.messages.length === 0) {
                    body.innerHTML = `<div class="text-center text-gray-600 text-xs my-auto italic">Ответов в теме пока нет.</div>`;
                } else {
                    ch.messages.forEach(m => {
                        let userAvatarHTML = m.user.avatar 
                            ? `<img src="${m.user.avatar}" class="w-6 h-6 rounded-full object-cover">`
                            : `<div class="w-6 h-6 rounded-full bg-slate-700 flex items-center justify-center text-[10px] text-gray-300"><i class="fa-solid fa-user"></i></div>`;

                        body.insertAdjacentHTML('beforeend', `
                            <div class="arizona-subcard p-3">
                                <div class="flex justify-between items-center mb-2 border-b border-[#222735] pb-1.5">
                                    <div class="flex items-center gap-2">
                                        ${userAvatarHTML}
