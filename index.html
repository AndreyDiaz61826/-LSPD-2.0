<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD Portal | Arizona Mobile 3</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Ubuntu', sans-serif; 
            background-color: #060814; 
            color: #f1f5f9; 
        }
        /* Полицейский стиль панелей */
        .lspd-header { 
            background: linear-gradient(180deg, #0f172a 0%, #0b0f19 100%); 
            border-bottom: 2px solid #1e3a8a; 
        }
        .lspd-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(30, 58, 138, 0.4); 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .lspd-subcard { 
            background: #0f172a; 
            border-left: 4px solid #3b82f6; 
            border-radius: 8px; 
        }
        .lspd-input { 
            background: #020617; 
            border: 1px solid #1e3a8a; 
            transition: all 0.3s;
        }
        .lspd-input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
            outline: none; 
        }
        
        /* Стили фракционных ролей */
        .role-leader { color: #ef4444; font-weight: 700; text-shadow: 0 0 8px rgba(239,68,68,0.4); }
        .role-deputy { color: #3b82f6; font-weight: 700; text-shadow: 0 0 8px rgba(59,130,246,0.4); }
        .role-high { color: #60a5fa; font-weight: 600; }
        .role-officer { color: #94a3b8; font-weight: 500; }
        .role-user { color: #64748b; font-weight: 500; }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden max-w-md mx-auto border-x border-[#1e3a8a]/30 shadow-2xl relative">

    <div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
        <img src="https://i.imgur.com/h96sSjG.jpg" class="w-full h-full object-cover" alt="LSPD Background">
    </div>

    <div class="relative z-10 flex flex-col h-full overflow-hidden">
        
        <header class="lspd-header px-4 py-4 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-shield-halved text-xl text-blue-500 animate-pulse"></i>
                <div class="text-sm font-bold tracking-wider text-blue-100 uppercase">LSPD | Мл. Сержант</div>
            </div>
            <div class="flex items-center gap-4 text-slate-300">
                <div onclick="changeAvatar()" class="w-8 h-8 rounded-full overflow-hidden border-2 border-blue-500 bg-slate-800 flex items-center justify-center cursor-pointer relative" title="Сменить аватарку">
                    <img id="user-avatar" src="" class="w-full h-full object-cover hidden">
                    <i id="avatar-placeholder" class="fa-solid fa-user-shield text-sm text-blue-400"></i>
                </div>
                <div class="relative cursor-pointer">
                    <i class="fa-solid fa-bell text-lg hover:text-blue-400 transition-colors"></i>
                    <span class="absolute -top-1 -right-1 bg-blue-600 text-[8px] text-white font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center">1</span>
                </div>
                <i class="fa-solid fa-right-from-bracket text-lg text-slate-400 hover:text-red-400 cursor-pointer hidden" id="logout-btn" onclick="logout()"></i>
            </div>
        </header>

        <div class="p-4 shrink-0">
            <div class="lspd-card p-4 flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-base font-bold text-white flex items-center gap-1.5 tracking-wide">
                            LOS SANTOS POLICE DEPT.
                        </h1>
                        <p class="text-[11px] text-blue-400 font-medium">Официальный Бортовой Портал</p>
                    </div>
                    <span class="bg-blue-500/10 text-blue-400 border border-blue-500/30 text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-tight">Mobile 3 🌸</span>
                </div>
                
                <div id="user-badge" class="bg-slate-900/80 border border-slate-800 rounded-xl p-3 text-xs hidden">
                    <div class="text-slate-400">Активный токен офицера:</div>
                    <div id="badge-name" class="font-bold text-sm mt-0.5"></div>
                </div>
            </div>
        </div>

        <div id="forum-view" class="flex-1 overflow-y-auto px-4 pb-6 space-y-3"></div>

        <div id="channel-view" class="flex-1 flex flex-col bg-[#060814] hidden overflow-hidden">
            <div class="p-3 bg-slate-900 border-b border-blue-900/40 flex items-center gap-3 shrink-0">
                <button onclick="backToForum()" class="text-slate-400 hover:text-white px-2 py-1 cursor-pointer">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <div>
                    <h2 id="channel-title" class="font-bold text-xs text-white uppercase tracking-wide"></h2>
                    <p id="channel-desc" class="text-[10px] text-blue-400"></p>
                </div>
            </div>
            <div id="channel-body" class="flex-1 p-4 overflow-y-auto space-y-3 flex flex-col"></div>
            <div id="chat-input-zone" class="p-3 bg-slate-900 border-t border-blue-900/40 shrink-0 hidden">
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="Введите текст рапорта/ответа..." class="flex-1 lspd-input rounded-xl px-4 py-3 text-xs text-slate-200">
                    <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 text-white rounded-xl px-5 text-xs font-bold cursor-pointer transition-colors">Отправить</button>
                </div>
            </div>
        </div>

        <div id="admin-trigger" class="p-4 bg-[#060814] border-t border-blue-950 shrink-0 hidden">
            <button onclick="openAdminMenu()" class="w-full bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 border border-blue-500/30 py-3 rounded-xl text-xs font-bold tracking-wider uppercase cursor-pointer transition-all">
                <i class="fa-solid fa-sliders mr-1.5"></i> Изменить звания персонала
            </button>
        </div>

    </div>

    <div id="login-modal" class="fixed inset-0 bg-[#020617]/95 flex items-center justify-center p-4 z-50">
        <div class="lspd-card p-6 w-full max-w-sm border-2 border-blue-900/50">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-blue-600/10 border-2 border-blue-500 rounded-full flex items-center justify-center mx-auto mb-3">
                    <i class="fa-solid fa-lock-open text-xl text-blue-400"></i>
                </div>
                <div class="text-lg font-bold text-white tracking-wider uppercase">Авторизация в КПК</div>
                <p id="login-tip" class="text-[11px] text-slate-400 mt-1">Новые пользователи создают аккаунт автоматически.</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] text-blue-400 font-bold uppercase tracking-wide mb-1">Имя пользователя (Nick_Name)</label>
                    <input id="login-nick" type="text" placeholder="Ivan_Ivanov" class="w-full lspd-input rounded-xl p-3.5 text-xs text-white">
                </div>
                <div>
                    <label id="pass-label" class="block text-[10px] text-blue-400 font-bold uppercase tracking-wide mb-1">Личный Пароль доступа</label>
                    <input id="login-pass" type="password" placeholder="••••••••" class="w-full lspd-input rounded-xl p-3.5 text-xs text-white">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl text-xs tracking-widest uppercase cursor-pointer transition-all shadow-lg shadow-blue-600/20 mt-2">
                    Подключиться к базе данных
                </button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden">
        <div class="lspd-card p-5 w-full max-w-sm flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-4 border-b border-blue-950 pb-2">
                <div class="font-bold text-xs text-blue-400 uppercase tracking-wider">Корректировка Ролей</div>
                <button onclick="closeAdminMenu()" class="text-slate-400 hover:text-white text-xl">&times;</button>
            </div>
            <div id="admin-user-list" class="flex-1 overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <script>
        const ROLES = {
            LEADER: { name: 'Шеф [10]', class: 'role-leader' },
            DEPUTY: { name: 'Главный Комиссар [9]', class: 'role-deputy' },
            HIGH: { name: 'Старший Состав', class: 'role-high' },
            OFFICER: { name: 'Офицер', class: 'role-officer' },
            USER: { name: 'Пользователь', class: 'role-user' }
        };

        let users = JSON.parse(localStorage.getItem('lspd_forum_users')) || [
            { nick: 'Moskvin_Bounce', role: 'LEADER', pass: null, avatar: '' },
            { nick: 'Trevor_Mersor', role: 'DEPUTY', pass: 'Bu2MvZ96', avatar: '' }
        ];

        let channels = [
            { id: 'upgrade', title: '📂 | Устав и система повышения', type: 'info', access: 'info', img: 'https://i.imgur.com/G3P2mO8.jpg', preText: 'Официальные критерии для продвижения по службе...', author: 'Moskvin_Bounce', time: 'Сегодня' },
            { id: 'swat', title: '⚡ | Академия и устав S.W.A.T', type: 'info', access: 'info', img: 'https://i.imgur.com/vHWhGqV.jpg', preText: 'Положения и регламенты тактического отряда', author: 'Trevor_Mersor', time: 'Вчера' },
            { id: 'bonuses', title: '💰 | Премиальный фонд департамента', type: 'info', access: 'info', img: 'https://i.imgur.com/6XzW79B.jpg', preText: 'Заявления на денежные выплаты за дежурства', author: 'Trevor_Mersor', time: '2 дня назад' },
            { id: 'kurilka', title: '💬 | Общая волна общения (Курилка)', type: 'chat', access: 'open', img: 'https://i.imgur.com/Hbyz74Y.jpg', preText: 'Свободные переговоры сотрудников вне службы', author: 'Система', time: 'Только что', messages: [] },
            { id: 'secret', title: '🔒 | Sheriff\'s Office (Секретный Архив)', type: 'chat', access: 'closed', allowed: ['LEADER', 'DEPUTY'], img: 'https://i.imgur.com/pZ6mD6c.jpg', preText: 'Кабинет Шефа и Высшего Руководства LSPD', author: 'Moskvin_Bounce', time: 'Секретно', messages: [] }
        ];

        let currentUser = null;
        let activeChannelId = null;

        document.getElementById('login-nick').addEventListener('input', (e) => {
            const nick = e.target.value.trim();
            const user = users.find(u => u.nick.toLowerCase() === nick.toLowerCase());
            const passLabel = document.getElementById('pass-label');

            if (user) {
                if (user.nick === 'Moskvin_Bounce' && !user.pass) {
                    passLabel.innerText = "Создайте секретный пароль Шефа (Первый вход)";
                    passLabel.style.color = "#3b82f6";
                } else {
                    passLabel.innerText = "Личный Пароль доступа";
                    passLabel.style.color = "#4b5563";
                }
            } else {
                passLabel.innerText = "Придумайте пароль для нового аккаунта";
                passLabel.style.color = "#10b981";
            }
        });

        function handleLogin() {
            const nick = document.getElementById('login-nick').value.trim();
            const pass = document.getElementById('login-pass').value;

            if (!nick || !pass) {
                alert('Заполните данные для входа!');
                return;
            }

            let user = users.find(u => u.nick.toLowerCase() === nick.toLowerCase());

            if (user) {
                if (user.nick === 'Moskvin_Bounce' && !user.pass) {
                    user.pass = pass;
                    localStorage.setItem('lspd_forum_users', JSON.stringify(users));
                    alert('Доступ лидера активирован! Пароль сохранен.');
                } else if (user.pass !== pass) {
                    alert('Ошибка! Неверный пароль доступа.');
                    return;
                }
            } else {
                user = { nick, role: 'USER', pass: pass, avatar: '' };
                users.push(user);
                localStorage.setItem('lspd_forum_users', JSON.stringify(users));
            }

            currentUser = user;
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('user-badge').classList.remove('hidden');
            
            updateAvatarUI();

            document.getElementById('badge-name').className = ROLES[currentUser.role].class;
            document.getElementById('badge-name').innerText = `${currentUser.nick} (${ROLES[currentUser.role].name})`;

            if (currentUser.role === 'LEADER' || currentUser.role === 'DEPUTY') {
                document.getElementById('admin-trigger').classList.remove('hidden');
            }

            renderForum();
        }

        function changeAvatar() {
            if (!currentUser) return;
            const url = prompt("Введите прямую ссылку URL на картинку для аватарки:", currentUser.avatar || "");
            if (url !== null) {
                currentUser.avatar = url.trim();
                const idx = users.findIndex(u => u.nick === currentUser.nick);
                if (idx !== -1) users[idx].avatar = currentUser.avatar;
                localStorage.setItem('lspd_forum_users', JSON.stringify(users));
                updateAvatarUI();
            }
        }

        function updateAvatarUI() {
            const img = document.getElementById('user-avatar');
            const placeholder = document.getElementById('avatar-placeholder');
            if (currentUser && currentUser.avatar) {
                img.src = currentUser.avatar;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                img.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
        }

        function renderForum() {
            const container = document.getElementById('forum-view');
            container.innerHTML = '';

            channels.forEach(ch => {
                const isClosed = ch.access === 'closed';
                const hasAccess = !isClosed || ch.allowed.includes(currentUser.role);

                let lastTopicHTML = hasAccess 
                    ? `<div class="text-[11px] text-slate-400 mt-1 truncate"><span class="text-blue-400 font-bold">Детали:</span> ${ch.preText}</div>
                       <div class="text-[10px] text-slate-500 mt-1">${ch.time} · Запустил: <span class="text-slate-400 font-medium">${ch.author}</span></div>`
                    : `<div class="text-[11px] text-red-400/80 mt-1 font-medium"><i class="fa-solid fa-lock mr-1"></i> Доступ заблокирован (Только Руководство)</div>`;

                container.insertAdjacentHTML('beforeend', `
                    <div onclick="openChannel('${ch.id}')" class="lspd-card overflow-hidden cursor-pointer hover:border-blue-500/60 hover:scale-[1.01] transition-all duration-200">
                        <div class="h-24 w-full bg-slate-900 relative">
                            <img src="${ch.img}" class="w-full h-full object-cover opacity-65">
                            <div class="absolute inset-0 bg-gradient-to-t modules from-[#0f172a] to-transparent"></div>
                            <div class="absolute bottom-2 left-3 font-bold text-xs text-white uppercase tracking-wider drop-shadow-md">${ch.title}</div>
                        </div>
                        <div class="p-3">
                            ${lastTopicHTML}
                        </div>
                    </div>
                `);
            });
        }

        function openChannel(id) {
            const ch = channels.find(c => c.id === id);
            if (ch.access === 'closed' && !ch.allowed.includes(currentUser.role)) {
                alert('Ошибка доступа! Данный канал зашифрован.');
                return;
            }

            activeChannelId = id;
            document.getElementById('forum-view').classList.add('hidden');
            document.getElementById('channel-view').classList.remove('hidden');
            document.getElementById('channel-title').innerText = ch.title;
            
            let descText = 'Доступ: Весь состав полиции';
            if (ch.access === 'info') descText = 'Режим: Информационный архив (Только чтение)';
            if (ch.access === 'closed') descText = 'Режим: Секретный архив руководства';
            document.getElementById('channel-desc').innerText = descText;

            renderChannelContent(ch);
        }

        function renderChannelContent(ch) {
            const body = document.getElementById('channel-body');
            const inputZone = document.getElementById('chat-input-zone');
            body.innerHTML = '';
            inputZone.classList.add('hidden');

            const canWrite = ch.access === 'open' || ((ch.access === 'info' || ch.access === 'closed') && (currentUser.role === 'LEADER' || currentUser.role === 'DEPUTY'));

            if (ch.type === 'info') {
                body.innerHTML = `
                    <div class="lspd-subcard p-4 text-slate-400 text-xs flex flex-col items-center justify-center py-12 text-center my-auto">
                        <i class="fa-solid fa-folder-closed text-3xl text-blue-900 mb-2"></i>
                        Информационный блок пуст.<br>Ожидайте публикации документов от руководства.
                    </div>
                `;
            } else {
                if (canWrite) inputZone.classList.remove('hidden');
                if (!ch.messages || ch.messages.length === 0) {
                    body.innerHTML = `<div class="text-center text-slate-500 text-xs my-auto italic">Рапортов и ответов на линии не обнаружено.</div>`;
                } else {
                    ch.messages.forEach(m => {
                        let userAvatarHTML = m.user.avatar 
                            ? `<img src="${m.user.avatar}" class="w-7 h-7 rounded-full object-cover border border-blue-500">`
                            : `<div class="w-7 h-7 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-[10px] text-blue-400"><i class="fa-solid fa-user-shield"></i></div>`;

                        body.insertAdjacentHTML('beforeend', `
                            <div class="lspd-subcard p-3.5 bg-slate-900/90">
                                <div class="flex justify-between items-center mb-2 border-b border-blue-950 pb-2">
                                    <div class="flex items-center gap-2">
                                        ${userAvatarHTML}
                                        <span class="text-xs font-bold text-slate-200">${m.user.nick}</s
